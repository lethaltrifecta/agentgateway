name: Hackathon Publish

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or ref to publish from (default: hackathon)"
        required: true
        default: "hackathon"
        type: string
      publish_agent_image:
        description: "Publish agentgateway image"
        required: true
        default: true
        type: boolean
      publish_controller_image:
        description: "Publish controller image"
        required: true
        default: true
        type: boolean
      publish_charts:
        description: "Publish Helm charts (includes CRDs)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  AGENT_IMAGE_NAME: ${{ github.repository_owner }}/agentgateway
  CONTROLLER_IMAGE_NAME: ${{ github.repository_owner }}/controller
  CHART_REGISTRY_IMAGE_BASE: ghcr.io/${{ github.repository_owner }}
  CONTROLLER_IMAGE_CACHE_SCOPE: hackathon-controller-arm64

concurrency:
  group: hackathon-publish-${{ inputs.target_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      target_ref: ${{ steps.meta.outputs.target_ref }}
      full_sha: ${{ steps.meta.outputs.full_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 1
          filter: blob:none

      - name: Resolve publish metadata
        id: meta
        env:
          TARGET_REF: ${{ inputs.target_ref }}
        run: |
          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          VERSION_TAG="0.0.0-${SHORT_SHA}"
          echo "target_ref=${TARGET_REF}" >> "$GITHUB_OUTPUT"
          echo "full_sha=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "## Hackathon Publish"
            echo "- target_ref: \`${{ steps.meta.outputs.target_ref }}\`"
            echo "- commit: \`${{ steps.meta.outputs.full_sha }}\`"
            echo "- version_tag: \`${{ steps.meta.outputs.version_tag }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  agent-image:
    if: ${{ inputs.publish_agent_image }}
    needs:
      - prepare
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.full_sha }}
          fetch-depth: 1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push agentgateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:${{ needs.prepare.outputs.version_tag }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version_tag }}
            GIT_REVISION=${{ needs.prepare.outputs.full_sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:buildcache-arm64,mode=max,ignore-error=true

  controller-image:
    if: ${{ inputs.publish_controller_image }}
    needs:
      - prepare
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.full_sha }}
          fetch-depth: 1
          sparse-checkout: |
            go.mod
            go.sum
            api
            controller
          sparse-checkout-cone-mode: false

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build controller binary
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          cd controller
          CGO_ENABLED=0 GOARCH=arm64 GOOS=linux go build \
            -ldflags="-X github.com/agentgateway/agentgateway/controller/pkg/version.Version=${VERSION_TAG} -s -w" \
            -o _output/pkg/agentgateway/agentgateway-linux-arm64 \
            ./cmd/agentgateway
          cp cmd/agentgateway/Dockerfile.agentgateway _output/pkg/agentgateway/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: controller/_output/pkg/agentgateway
          file: controller/_output/pkg/agentgateway/Dockerfile.agentgateway
          push: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE_NAME }}:${{ needs.prepare.outputs.version_tag }}
          build-args: |
            GOARCH=arm64
          cache-from: type=gha,scope=${{ env.CONTROLLER_IMAGE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CONTROLLER_IMAGE_CACHE_SCOPE }},ignore-error=true

  charts:
    if: ${{ inputs.publish_charts }}
    needs:
      - prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.full_sha }}
          fetch-depth: 1
          sparse-checkout: |
            controller

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Push Helm charts (includes CRDs)
        env:
          CHART_VERSION: ${{ needs.prepare.outputs.version_tag }}
        run: |
          make -C controller package-agentgateway-charts HELM=helm VERSION="${CHART_VERSION}"
          helm push "controller/_test/agentgateway-${CHART_VERSION}.tgz" "oci://${CHART_REGISTRY_IMAGE_BASE}/charts"
          helm push "controller/_test/agentgateway-crds-${CHART_VERSION}.tgz" "oci://${CHART_REGISTRY_IMAGE_BASE}/charts"

      - name: Summary
        run: |
          {
            echo "## Charts"
            echo "- version: \`${{ needs.prepare.outputs.version_tag }}\`"
            echo "- oci://ghcr.io/${{ github.repository_owner }}/charts/agentgateway"
            echo "- oci://ghcr.io/${{ github.repository_owner }}/charts/agentgateway-crds"
          } >> "${GITHUB_STEP_SUMMARY}"
