name: Hackathon Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: write

concurrency:
  group: hackathon-sync
  cancel-in-progress: true

env:
  UPSTREAM_REPO: https://github.com/agentgateway/agentgateway.git
  BASE_BRANCH: main
  HACKATHON_BRANCH: hackathon
  PR_878_REF: refs/pull/878/head
  PR_925_REF: refs/pull/925/head
  MIRROR_878_BRANCH: mirror/pr-878
  MIRROR_925_BRANCH: mirror/pr-925

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync Mirrors and Rebuild Hackathon
        shell: bash
        run: |
          set -euo pipefail

          KNOWN_CONFLICT_FILE="crates/agentgateway/tests/tests/mod.rs"
          resolved_known_conflict="false"
          stripped_workflow_changes="false"

          resolve_known_conflict() {
            local unresolved_count
            local unresolved_file
            unresolved_count="$(git diff --name-only --diff-filter=U | wc -l | tr -d ' ')"
            unresolved_file="$(git diff --name-only --diff-filter=U | head -n 1)"

            if [[ "${unresolved_count}" -ne 1 ]] || [[ "${unresolved_file}" != "${KNOWN_CONFLICT_FILE}" ]]; then
              return 1
            fi

            git checkout --ours "${KNOWN_CONFLICT_FILE}"
            grep -q '^mod mcp;$' "${KNOWN_CONFLICT_FILE}" || printf '\nmod mcp;\n' >> "${KNOWN_CONFLICT_FILE}"
            grep -q '^pub mod oauth2;$' "${KNOWN_CONFLICT_FILE}" || printf 'pub mod oauth2;\n' >> "${KNOWN_CONFLICT_FILE}"
            git add "${KNOWN_CONFLICT_FILE}"
            if git rev-parse -q --verify CHERRY_PICK_HEAD >/dev/null; then
              git cherry-pick --continue
            else
              git commit --no-edit
            fi
            resolved_known_conflict="true"
          }

          apply_branch_changes() {
            local branch="$1"
            local commit
            while IFS= read -r commit; do
              if ! git cherry-pick -X theirs --allow-empty "${commit}"; then
                if ! resolve_known_conflict; then
                  echo "Unhandled cherry-pick conflicts while applying ${commit} from ${branch}:"
                  git diff --name-only --diff-filter=U
                  exit 1
                fi
              fi
            done < <(git rev-list --reverse "upstream/${BASE_BRANCH}..${branch}")
          }

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "${UPSTREAM_REPO}"
          else
            git remote add upstream "${UPSTREAM_REPO}"
          fi

          git fetch --prune origin \
            "${BASE_BRANCH}" \
            "${HACKATHON_BRANCH}" || true
          git fetch --prune upstream \
            "${BASE_BRANCH}" \
            "${PR_878_REF}:${MIRROR_878_BRANCH}" \
            "${PR_925_REF}:${MIRROR_925_BRANCH}"

          base_sha="$(git rev-parse "refs/remotes/origin/${BASE_BRANCH}")"
          upstream_base_sha="$(git rev-parse "upstream/${BASE_BRANCH}")"
          mirror_878_sha="$(git rev-parse "${MIRROR_878_BRANCH}")"
          mirror_925_sha="$(git rev-parse "${MIRROR_925_BRANCH}")"

          integration_branch="_hackathon_integration_${GITHUB_RUN_ID}"
          git switch --detach "refs/remotes/origin/${BASE_BRANCH}"
          git switch -C "${integration_branch}"

          apply_branch_changes "${MIRROR_878_BRANCH}"
          apply_branch_changes "${MIRROR_925_BRANCH}"

          old_hackathon_sha="$(git ls-remote --heads origin "${HACKATHON_BRANCH}" | awk '{print $1}')"
          old_hackathon_tree=""
          workflow_restore_ref=""

          if git show-ref --verify --quiet "refs/remotes/origin/${HACKATHON_BRANCH}"; then
            old_hackathon_tree="$(git rev-parse "refs/remotes/origin/${HACKATHON_BRANCH}^{tree}")"
            workflow_restore_ref="refs/remotes/origin/${HACKATHON_BRANCH}"
          else
            workflow_restore_ref="refs/remotes/origin/${BASE_BRANCH}"
          fi

          # Keep workflows pinned to the existing hackathon branch so this combo
          # branch can be updated using GITHUB_TOKEN without workflow write access.
          if ! git diff --quiet "${workflow_restore_ref}"..HEAD -- .github/workflows; then
            git rm -r --ignore-unmatch .github/workflows
            git checkout "${workflow_restore_ref}" -- .github/workflows
            if ! git diff --cached --quiet -- .github/workflows; then
              git add .github/workflows
              git commit -m "chore: keep workflows unchanged in hackathon sync"
              stripped_workflow_changes="true"
            fi
          fi

          new_hackathon_sha="$(git rev-parse HEAD)"
          new_hackathon_tree="$(git rev-parse HEAD^{tree})"

          if [[ "${new_hackathon_tree}" == "${old_hackathon_tree}" ]]; then
            pushed="false"
          else
            push_args=(--atomic)
            if [[ -n "${old_hackathon_sha}" ]]; then
              push_args+=(--force-with-lease="refs/heads/${HACKATHON_BRANCH}:${old_hackathon_sha}")
            fi

            git push "${push_args[@]}" origin \
              "HEAD:refs/heads/${HACKATHON_BRANCH}"
            pushed="true"
          fi

          {
            echo "## Hackathon Sync"
            echo "- Base branch: \`${BASE_BRANCH}\`"
            echo "- base sha: \`${base_sha}\`"
            echo "- upstream base sha: \`${upstream_base_sha}\`"
            echo "- mirror/pr-878: \`${mirror_878_sha}\`"
            echo "- mirror/pr-925: \`${mirror_925_sha}\`"
            echo "- hackathon: \`${new_hackathon_sha}\`"
            echo "- known-conflict-auto-resolved: \`${resolved_known_conflict}\`"
            echo "- workflow-changes-stripped: \`${stripped_workflow_changes}\`"
            echo "- pushed: \`${pushed}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
